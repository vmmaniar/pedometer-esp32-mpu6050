name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install analysis deps
        working-directory: python_analysis
        run: pip install -r requirements.txt

      - name: Run algorithm tests
        working-directory: python_analysis
        run: pytest -v

      - name: Smoke-test the threshold sweep
        working-directory: python_analysis
        run: python tune_thresholds.py

  esp-idf-build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build

      - name: Report binary size
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py size
